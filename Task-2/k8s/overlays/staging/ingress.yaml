apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-app
  namespace: staging
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - staging.flask-app.example.com
    secretName: flask-app-staging-tls
  rules:
  - host: staging.flask-app.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: flask-app
            port:
              number: 80
