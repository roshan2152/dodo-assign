apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: flask-app-success-rate
spec:
  args:
  - name: service-name
  - name: namespace
    value: production

  metrics:
  - name: success-rate
    interval: 5s
    count: 2
    successCondition: result >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc:9090
        query: |
          sum(rate(
            http_requests_total{
              service="{{args.service-name}}",
              namespace="{{args.namespace}}",
              status!~"5.."
            }[2m]
          ))
          /
          sum(rate(
            http_requests_total{
              service="{{args.service-name}}",
              namespace="{{args.namespace}}"
            }[2m]
          ))

  - name: latency
    interval: 5s
    count: 2
    successCondition: result <= 500
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc:9090
        query: |
          histogram_quantile(0.95,
            sum(rate(
              http_request_duration_seconds_bucket{
                service="{{args.service-name}}",
                namespace="{{args.namespace}}"
              }[2m]
            )) by (le)
          ) * 1000
