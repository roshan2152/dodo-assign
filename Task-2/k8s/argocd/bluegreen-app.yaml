apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-app-bluegreen
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: flask-app-project

  source:
    repoURL: https://github.com/roshan2152/dodo-assign.git
    targetRevision: main
    path: Task-2/k8s/rollouts

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10
