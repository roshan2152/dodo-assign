---
apiVersion: v1
kind: Namespace
metadata:
  name: audit
  labels:
    security: baseline

---
# Kubernetes API Server Audit Policy
# This defines what API server events are logged
# 
# To enable on your cluster:
# 1. Add to kube-apiserver manifest:
#    - --audit-policy-file=/etc/kubernetes/audit/audit-policy.yaml
#    - --audit-log-path=/var/log/kubernetes/audit.log
#    - --audit-log-maxage=30
#    - --audit-log-maxbackup=5
# 
# 2. Mount this policy file to the apiserver container
#
# AUDIT POLICY CONFIGURATION:
# rules:
apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-policy
  namespace: audit
data:
  policy.yaml: |
    rules:
    # Log all requests at RequestResponse level
    - level: RequestResponse
      omitStages:
      - RequestReceived
      resources:
      - group: ""
        resources: ["secrets"]
      namespaces: ["voting-app", "default"]

    # Log pod exec/attach at RequestResponse level
    - level: RequestResponse
      verbs: ["create"]
      resources:
      - group: ""
        resources: ["pods/exec", "pods/attach"]

    # Log all other resources in voting-app namespace
    - level: Metadata
      namespaces: ["voting-app"]

    # Log configmap and secret changes
    - level: Metadata
      resources:
      - group: ""
        resources: ["secrets", "configmaps"]

    # Log all verb changes (delete, patch, update, create)
    - level: Metadata
      verbs: ["create", "update", "patch", "delete", "deletecollection"]

    # Log authentication events
    - level: Metadata
      resources:
      - group: ""
        resources: ["serviceaccounts"]

    # Default fall-through rule
    - level: Metadata
      omitStages:
      - RequestReceived

---
# Audit Log Storage Deployment
# This pod collects and stores audit logs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-log-collector
  namespace: audit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-log-collector
  template:
    metadata:
      labels:
        app: audit-log-collector
    spec:
      serviceAccountName: audit-collector
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
      - name: collector
        image: busybox:latest
        command: ["/bin/sh"]
        args: 
        - -c
        - |
          echo "Audit log collector started"
          tail -f /var/log/audit/*.log 2>/dev/null || sleep infinity
        volumeMounts:
        - name: audit-logs
          mountPath: /var/log/audit
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: audit-logs
        hostPath:
          path: /var/log/kubernetes
          type: DirectoryOrCreate

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-collector
  namespace: audit

---
# RBAC for audit log collector
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: audit-log-reader
rules:
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: audit-log-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: audit-log-reader
subjects:
- kind: ServiceAccount
  name: audit-collector
  namespace: audit
