---
# Namespaces for security isolation
apiVersion: v1
kind: Namespace
metadata:
  name: default
  labels:
    security: baseline

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    security: baseline

---
apiVersion: v1
kind: Namespace
metadata:
  name: voting-app
  labels:
    security: baseline

---
# Service Accounts for different roles
apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer
  namespace: voting-app

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: operator
  namespace: voting-app

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin
  namespace: voting-app
