---
# Example: Secure Pod Configuration complying with PSS Restricted
# This demonstrates the security contexts required for restricted PSS
apiVersion: v1
kind: Pod
metadata:
  name: secure-app-example
  namespace: voting-app
spec:
  serviceAccountName: developer
  securityContext:
    runAsNonRoot: true        # Must run as non-root
    runAsUser: 1000           # Specific non-root UID
    fsGroup: 2000             # File system group
    seccompProfile:
      type: RuntimeDefault    # Use default seccomp profile
  containers:
  - name: app
    image: myapp:latest
    imagePullPolicy: Always
    securityContext:
      allowPrivilegeEscalation: false  # Prevent privilege escalation
      capabilities:
        drop:
        - ALL                           # Drop all Linux capabilities
        add:
        - NET_BIND_SERVICE              # Only add what's needed
      readOnlyRootFilesystem: true      # Read-only root filesystem
      runAsNonRoot: true
      runAsUser: 1000
    ports:
    - containerPort: 8080
      protocol: TCP
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    livenessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /ready
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5
    volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: app-data
      mountPath: /app/data
  volumes:
  - name: tmp
    emptyDir: {}
  - name: app-data
    emptyDir: {}
