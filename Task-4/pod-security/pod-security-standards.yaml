---
# Pod Security Standards Configuration
# Applied at namespace level using labels
# This enforces the "restricted" PSS which:
# - Prevents privileged containers
# - Enforces read-only root filesystem
# - Restricts host network/PID/IPC access
# - Disallows running as root
#
# Usage: Add these labels to namespaces to enforce
# pod-security.kubernetes.io/enforce: restricted
# pod-security.kubernetes.io/audit: restricted
# pod-security.kubernetes.io/warn: restricted

apiVersion: v1
kind: Namespace
metadata:
  name: voting-app
  labels:
    security: baseline
    # PSS Enforcement: Restricted policy
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    # Audit violations
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    # Warn on violations
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    security: baseline
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
