---
# External Secrets Operator
# Syncs secrets from Vault to Kubernetes
# Install: helm repo add external-secrets https://charts.external-secrets.io
#         helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-store
  namespace: voting-app
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "voting-app"
          serviceAccountRef:
            name: default

---
# Example ExternalSecret to sync DB credentials from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: voting-app-secret
  namespace: voting-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-store
    kind: SecretStore
  target:
    name: voting-app-credentials
    creationPolicy: Owner
  data:
  - secretKey: database-url
    remoteRef:
      key: voting-app/db-url
  - secretKey: database-password
    remoteRef:
      key: voting-app/db-password
  - secretKey: redis-url
    remoteRef:
      key: voting-app/redis-url

---
# Secret template for database credentials
apiVersion: v1
kind: Secret
metadata:
  name: voting-app-credentials
  namespace: voting-app
type: Opaque
stringData:
  database-url: "postgres://user:password@postgres:5432/voting"
  database-password: "secure-password"
  redis-url: "redis://redis:6379"
