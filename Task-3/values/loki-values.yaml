# Loki configuration for single binary mode
deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: 'filesystem'

  schemaConfig:
    configs:
      - from: 2024-04-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  persistence:
    enabled: false

  # Use emptyDir for storage directories
  extraVolumes:
    - name: loki-data
      emptyDir: {}

  extraVolumeMounts:
    - name: loki-data
      mountPath: /var/loki

  resources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# Disable components we don't need
write:
  replicas: 0

read:
  replicas: 0

backend:
  replicas: 0

gateway:
  enabled: false

# Disable monitoring
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

# Disable tests
test:
  enabled: false
