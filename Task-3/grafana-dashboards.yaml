      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Flask Application Performance",
      "uid": "flask-app-performance",
      "version": 1
    }
