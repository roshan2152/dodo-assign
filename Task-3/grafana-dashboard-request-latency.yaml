              "intervalFactor": 1,
              "legendFormat": "{{ instance }} - {{ method }}",
              "refId": "A"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
